<div id="pizzaModal" class="modal">
  <div class="modal-content">
    <span class="close-btn">&times;</span>
    <h2 id="modalTitle"></h2>
    <p id="modalDescription"></p>
  </div>
</div>

<script>
// 1. Create a "Library" of your pizza descriptions
const pizzaInfo = {
  "Hawaiian Pizza": "A tropical classic! Topped with savory ham, sweet pineapple, and extra mozzarella cheese.",
  "VegPizza": "A garden delight featuring fresh bell peppers, red onions, mushrooms, and black olives.",
  "BbqPizza": "Tangy BBQ sauce topped with grilled chicken, red onions, and a touch of cilantro.",
  "Cheezy Pizza": "For the cheese lovers! Pizza with four cheesy layers.",
  "MeatLoversPizza": "Hearty and filling! Packed with pepperoni, sausage, bacon, and ground beef."
};

// 2. Get the Modal elements from the page
const modal = document.getElementById("pizzaModal");
const title = document.getElementById("modalTitle");
const description = document.getElementById("modalDescription");
const closeBtn = document.querySelector(".close-btn");

// 3. Tell the buttons to listen for a click
document.querySelectorAll('.menu-btn').forEach(button => {
  button.addEventListener('click', (event) => {
    event.preventDefault(); // Prevents the page from jumping
    
    // Get the name of the pizza from the <h3> tag in the card
    const pizzaName = button.parentElement.querySelector('h3').innerText;
    
    // Put the name and description into the modal
    title.innerText = pizzaName;
    description.innerText = pizzaInfo[pizzaName] || "Delicious fresh pizza!";
    
    // Show the modal!
    modal.style.display = "block";
  });
});

// 4. Close the modal when 'X' is clicked
closeBtn.onclick = () => modal.style.display = "none";

// 5. Close the modal if the user clicks anywhere outside the white box
window.onclick = (event) => {
  if (event.target == modal) {
    modal.style.display = "none";
  }
}

function handleAddToCart(btn) {
    const container = btn.parentElement;
    const controls = container.querySelector('.quantity-controls');
    
    btn.style.display = 'none';      
    controls.style.display = 'flex'; 
}

function updateQty(btn, change) {
    const qtySpan = btn.parentElement.querySelector('.qty-number');
    const container = btn.closest('.cart-container');
    const addBtn = container.querySelector('.cart-btn');
    const controls = container.querySelector('.quantity-controls');
    
    let currentQty = parseInt(qtySpan.innerText);
    let newQty = currentQty + change;

    if (newQty > 0) {
        qtySpan.innerText = newQty;
    } else {
        // Switch back to "ADD TO CART" if quantity hits 0
        qtySpan.innerText = 1; 
        controls.style.display = 'none';
        addBtn.style.display = 'block';
    }
}
</script>
